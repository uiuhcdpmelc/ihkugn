<html>
<head>
<title>Loading</title>
</head>
<body>
<script>
var initialURL = window.location.href;
// Extracting the hash part of the URL
var hashPart = initialURL.split('#')[1];
// Extracting values from the hash part
var hashValues = hashPart.split('/');

// Rearranging the values for the new URL format
var newURL = 'https://www.dynsor.com/261R5BDH/7HCHNFTM/?sub1=' + hashValues[2] + '&sub2=' + hashValues[1].split('_')[0] + '_32&sub3=' + hashValues[5] + '_' + hashValues[6] + '_' + hashValues[3] + '_' + hashValues[4] + '_md' ;
document.location.href = newURL;  
</script>
</body>
</html>
